<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Tracker | Owner Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; }
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
        .glow-text {
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            border-color: #00ffcc;
            box-shadow: 0 10px 30px -10px rgba(0, 255, 204, 0.3);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-gray-200">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md border border-gray-800">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold glow-text">🔐 FROST PANEL</h1>
                <p class="text-gray-400 text-sm mt-2">Owner Authentication Required</p>
            </div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-[#00ffcc] transition">
                <input type="password" id="password" placeholder="Password" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#00ffcc] transition">
                <button type="submit" class="w-full bg-[#00ffcc] text-black font-bold py-3 rounded-lg hover:bg-[#00ddbb] transition duration-200">ACCESS PANEL</button>
            </form>
            <p class="text-xs text-center text-gray-500 mt-4">⚠️ Restricted Area • Frost Security</p>
        </div>
    </div>

    <div id="dashboardPage" class="hidden min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold glow-text">📡 FROST TRACKER</h1>
                    <p class="text-gray-400 text-sm mt-1">Real-time visitor intelligence</p>
                </div>
                <button id="logoutBtn" class="bg-red-600/30 hover:bg-red-600/50 px-4 py-2 rounded-lg border border-red-500/50 transition">Logout</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" id="statsCards">
                <div class="glass rounded-xl p-5 border border-gray-800">
                    <p class="text-gray-400 text-sm">Total Visits</p>
                    <p class="text-3xl font-bold text-[#00ffcc]" id="totalCount">0</p>
                </div>
                <div class="glass rounded-xl p-5 border border-gray-800">
                    <p class="text-gray-400 text-sm">Unique IPs</p>
                    <p class="text-3xl font-bold text-[#00ffcc]" id="uniqueCount">0</p>
                </div>
            </div>

            <div class="glass rounded-xl p-6 border border-gray-800">
                <h2 class="text-xl font-bold mb-4">📋 Visitor Logs</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="border-b border-gray-700">
                            <tr class="text-left text-gray-400">
                                <th class="pb-3">Time</th>
                                <th class="pb-3">IP</th>
                                <th class="pb-3">Location</th>
                                <th class="pb-3">Device</th>
                                <th class="pb-3">Browser</th>
                                <th class="pb-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="logsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const AUTH_KEY = "frost_owner_auth";
        const VALID_USER = "200714";
        const VALID_PASS = "200714";

        function checkAuth() {
            if (localStorage.getItem(AUTH_KEY) === "true") {
                document.getElementById("loginPage").classList.add("hidden");
                document.getElementById("dashboardPage").classList.remove("hidden");
                loadDashboard();
            }
        }

        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            if (user === VALID_USER && pass === VALID_PASS) {
                localStorage.setItem(AUTH_KEY, "true");
                checkAuth();
            } else {
                alert("❌ Username atau password salah!");
            }
        });

        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            localStorage.removeItem(AUTH_KEY);
            location.reload();
        });

        function loadDashboard() {
            const logs = JSON.parse(localStorage.getItem("tracker_logs") || "[]");
            document.getElementById("totalCount").innerText = logs.length;
            const uniqueIPs = new Set(logs.map(l => l.ip).filter(ip => ip && ip !== "Tidak terdeteksi"));
            document.getElementById("uniqueCount").innerText = uniqueIPs.size;

            const tbody = document.getElementById("logsTable");
            tbody.innerHTML = logs.map((log, idx) => `
                <tr class="border-b border-gray-800 hover:bg-white/5">
                    <td class="py-3 text-xs">${new Date(log.timestamp).toLocaleString()}</td>
                    <td class="py-3 font-mono text-xs">${log.ip || "-"}</td>
                    <td class="py-3 text-xs">
                        ${log.location?.city ? `${log.location.city}, ${log.location.country}<br><a href="${log.location.mapLink}" target="_blank" class="text-[#00ffcc] text-xs">📍 Map</a>` : (log.location?.error || "-")}
                    </td>
                    <td class="py-3 text-xs">${log.device?.os || "-"}<br>${log.device?.screen || ""}</td>
                    <td class="py-3 text-xs">${log.device?.browser || "-"}</td>
                    <td class="py-3">
                        <button onclick='viewDetail(${JSON.stringify(log).replace(/'/g, "\\'")})' class="text-[#00ffcc] text-xs hover:underline">Detail</button>
                    </td>
                </tr>
            `).join("");
        }

        window.viewDetail = (log) => {
            alert(JSON.stringify(log, null, 2));
        };

        checkAuth();
    </script>
</body>
                                                                                                  </html>
