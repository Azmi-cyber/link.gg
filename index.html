<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .loader {
            text-align: center;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 20px #00ffcc; }
        }
        .loader h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .loader p {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h1>⚡ SECURE CONNECTION ⚡</h1>
        <p>Verifying your device...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
